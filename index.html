<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcipher</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Rajdhani', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(120, 0, 255, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 0, 128, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.1) 0%, transparent 70%);
      animation: gradientPulse 8s ease-in-out infinite;
    }

    @keyframes gradientPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: orbFloat 10s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 0, 255, 0.4) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.35) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.3) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }

    .orb-4 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 255, 0, 0.25) 0%, transparent 70%);
      top: 20%;
      right: 10%;
      animation-delay: -7s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 30px) scale(1.05); }
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: particleFloat 15s linear infinite;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(255, 0, 255, 0.5);
    }

    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      3% { opacity: 0; }
      8% { opacity: 1; }
      80% { opacity: 1; }
      92% { opacity: 0; }
      100% { transform: translateY(-115vh) translateX(50px) rotate(720deg); opacity: 0; }
    }

    .shooting-star {
      position: absolute;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, rgba(0, 255, 255, 0.8), transparent);
      animation: shoot 3s linear infinite;
      opacity: 0;
    }

    @keyframes shoot {
      0% { transform: translateX(-100px) translateY(0); opacity: 0; }
      10% { opacity: 1; }
      30% { transform: translateX(calc(100vw + 100px)) translateY(200px); opacity: 0; }
      100% { opacity: 0; }
    }

    .scan-line {
      position: absolute;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: -4px; }
      100% { top: 100%; }
    }

    .noise {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 450px;
      padding: 0 15px;
    }

    @media (max-width: 480px) {
      body {
        padding: 40px 10px;
      }
      .container {
        padding: 0;
      }
      .links {
        width: 100%;
      }
      .link {
        padding: 15px 18px;
        width: 100%;
      }
      .name {
        font-size: 26px;
      }
      .bio {
        text-align: center;
      }
      .side-decor {
        display: none;
      }
      .corner-decor {
        width: 80px;
        height: 80px;
      }
    }

    .avatar-container {
      position: relative;
      margin-bottom: 20px;
    }

    .avatar-ring {
      position: absolute;
      width: 140px;
      height: 140px;
      border: 3px solid transparent;
      border-top-color: #00ffff;
      border-right-color: #ff00ff;
      border-radius: 50%;
      animation: spin 3s linear infinite;
      top: -20px;
      left: -20px;
    }

    .avatar-ring:nth-child(2) {
      width: 160px;
      height: 160px;
      border-top-color: #ff00ff;
      border-right-color: #ffff00;
      animation-duration: 4s;
      animation-direction: reverse;
      top: -30px;
      left: -30px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e, #2d1b4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      margin: 0 auto;
      position: relative;
      box-shadow: 
        0 0 30px rgba(0, 255, 255, 0.3),
        0 0 60px rgba(255, 0, 255, 0.2),
        inset 0 0 20px rgba(255, 255, 255, 0.1);
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
      z-index: -1;
      animation: borderRotate 4s linear infinite;
    }

    @keyframes borderRotate {
      100% { filter: hue-rotate(360deg); }
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 5px;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .bio {
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 18px 25px;
      background: linear-gradient(135deg, rgba(20, 20, 35, 0.9), rgba(30, 20, 50, 0.9));
      border-radius: 15px;
      text-decoration: none;
      color: white;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .link:hover::before {
      left: 100%;
    }

    .link::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 15px;
      padding: 2px;
      background: linear-gradient(135deg, var(--glow-color-1), var(--glow-color-2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link:hover::after {
      opacity: 1;
    }

    .link:hover {
      transform: translateX(10px) scale(1.02);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), 0 0 20px var(--glow-shadow);
    }

    .link-icon {
      font-size: 28px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--glow-color-1), var(--glow-color-2));
      border-radius: 12px;
      box-shadow: 0 4px 15px var(--glow-shadow);
      transition: transform 0.3s;
    }

    .link:hover .link-icon {
      transform: rotate(10deg) scale(1.1);
    }

    .link-text { flex: 1; }
    .link-title { 
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
    }
    .link-handle { 
      font-size: 13px; 
      color: #888;
      margin-top: 2px;
    }
    .link-arrow { 
      font-size: 20px;
      opacity: 0.5;
      transition: all 0.3s;
    }
    .link:hover .link-arrow {
      opacity: 1;
      transform: translateX(5px);
    }

    .riot-tr { --glow-color-1: #ff6b6b; --glow-color-2: #ffa500; --glow-shadow: rgba(255, 107, 107, 0.4); }
    .riot-euw { --glow-color-1: #4ecdc4; --glow-color-2: #44a3aa; --glow-shadow: rgba(78, 205, 196, 0.4); }
    .email { --glow-color-1: #667eea; --glow-color-2: #764ba2; --glow-shadow: rgba(102, 126, 234, 0.4); }
    .instagram { --glow-color-1: #f857a6; --glow-color-2: #ff5858; --glow-shadow: rgba(248, 87, 166, 0.4); }
    .steam { --glow-color-1: #00ffff; --glow-color-2: #0088ff; --glow-shadow: rgba(0, 255, 255, 0.4); }

    .floating {
      position: fixed;
      font-size: 20px;
      opacity: 0.1;
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    .floating:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
    .floating:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
    .floating:nth-child(3) { bottom: 30%; left: 5%; animation-delay: 2s; }
    .floating:nth-child(4) { bottom: 15%; right: 10%; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    .glow-text {
      position: absolute;
      font-family: 'Orbitron', sans-serif;
      font-size: 100px;
      font-weight: 900;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
    }

    .glow-text-1 { top: 10%; left: 50%; transform: translateX(-50%); color: #ff00ff; }
    .glow-text-2 { bottom: 5%; left: 50%; transform: translateX(-50%); color: #00ffff; }

    .side-decor {
      position: fixed;
      top: 0;
      height: 100%;
      width: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      z-index: 1;
      opacity: 0.6;
    }

    .side-decor.left { left: 0; }
    .side-decor.right { right: 0; }

    .side-line {
      width: 2px;
      height: 150px;
      background: linear-gradient(to bottom, transparent, var(--line-color), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }

    .side-icon {
      font-size: 24px;
      animation: sideFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 0 10px var(--icon-color));
    }

    @keyframes lineGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes sideFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .corner-decor {
      position: fixed;
      width: 150px;
      height: 150px;
      opacity: 0.15;
      z-index: 1;
    }

    .corner-decor.top-left {
      top: 0;
      left: 0;
      border-top: 3px solid #ff00ff;
      border-left: 3px solid #ff00ff;
    }

    .corner-decor.top-right {
      top: 0;
      right: 0;
      border-top: 3px solid #00ffff;
      border-right: 3px solid #00ffff;
    }

    .corner-decor.bottom-left {
      bottom: 0;
      left: 0;
      border-bottom: 3px solid #ffff00;
      border-left: 3px solid #ffff00;
    }

    .corner-decor.bottom-right {
      bottom: 0;
      right: 0;
      border-bottom: 3px solid #00ff88;
      border-right: 3px solid #00ff88;
    }

    .visitor-counter {
      margin-top: 40px;
      padding: 15px 30px;
      background: linear-gradient(135deg, rgba(20, 20, 35, 0.9), rgba(30, 20, 50, 0.9));
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(10px);
      animation: counterPulse 3s ease-in-out infinite;
    }

    @keyframes counterPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.1); }
      50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
    }

    .counter-icon {
      font-size: 24px;
      animation: eyeGlow 2s ease-in-out infinite;
    }

    @keyframes eyeGlow {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.8)); }
    }

    .counter-content {
      text-align: left;
    }

    .counter-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .counter-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #444;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .footer span {
      color: #00ffff;
    }
  </style>
</head>
<body>

  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 30;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.bottom = '-' + (Math.random() * 100 + 50) + 'px';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
        particle.style.width = (Math.random() * 3 + 2) + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
      }
    }

    createParticles();
  </script>

            window.goatcounter.visit_count({append: '#visitor-count'})
        }
    }, 100)
  </script>
